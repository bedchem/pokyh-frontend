services:
  web:
    build:
      context: .
      args:
        - NEXT_PUBLIC_API_KEY
        - NEXT_PUBLIC_SITE_URL
        - NEXT_PUBLIC_DEBUG_API
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
      - SESSION_SECRET
      - API_BACKEND_URL
      - API_BACKEND_KEY
      - API_SERVER_KEY
